# CI 파이프라인 - lint/typecheck, 테스트, 빌드를 순차적으로 실행
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # pnpm 버전 고정
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  # ── 1단계: 린트 & 타입 체크 ──────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Node.js 설정 (pnpm 스토어 캐시 포함)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: API 타입 체크
        run: pnpm --filter @devsecops/api typecheck

      - name: Web 타입 체크
        run: pnpm --filter @devsecops/web typecheck

  # ── 2단계: 테스트 ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Node.js 설정 (pnpm 스토어 캐시 포함)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: API 단위 테스트 실행 (Vitest)
        run: pnpm --filter @devsecops/api test

  # ── 3단계: 빌드 (lint-and-typecheck + test 완료 후 실행) ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint-and-typecheck
      - test
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Node.js 설정 (pnpm 스토어 캐시 포함)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: API 빌드
        run: pnpm --filter @devsecops/api build

      - name: Web 빌드
        run: pnpm --filter @devsecops/web build
