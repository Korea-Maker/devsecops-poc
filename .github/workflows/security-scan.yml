# 보안 스캔 워크플로우 - PR 시 semgrep/trivy/gitleaks 를 실행하고 PR Comment로 결과 보고
name: Security Scan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    name: "보안 스캔"
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 보안 스캔 실행 + PR Comment
        id: scan
        uses: ./.github/actions/security-scan
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-threshold: critical
          # engines: semgrep,trivy,gitleaks  (기본값)
          # semgrep-config: auto             (기본값)

      - name: 스캔 결과 요약 출력
        if: always()
        shell: bash
        run: |
          echo "총 findings: ${{ steps.scan.outputs.total-findings }}"
          echo "Critical: ${{ steps.scan.outputs.critical-count }}"
          echo "High: ${{ steps.scan.outputs.high-count }}"
          echo "차단 여부: ${{ steps.scan.outputs.blocked }}"
