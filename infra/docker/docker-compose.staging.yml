version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: devsecops-db-staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devsecops}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-devsecops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Fastify API Server
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: devsecops-api-staging
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-devsecops}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      GOOGLE_OAUTH_ID: ${GOOGLE_OAUTH_ID:-}
      GOOGLE_OAUTH_SECRET: ${GOOGLE_OAUTH_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Next.js Web Server
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: devsecops-web-staging
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-staging}
    depends_on:
      - api
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  devsecops-network:
    driver: bridge

volumes:
  postgres_data_staging:
    driver: local
