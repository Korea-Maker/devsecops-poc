services:
  postgres:
    image: postgres:16-alpine
    container_name: previo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: previo
      POSTGRES_PASSWORD: previo
      POSTGRES_DB: previo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
