services:
  postgres:
    image: postgres:16-alpine
    container_name: devsecops-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devsecops
      POSTGRES_PASSWORD: devsecops
      POSTGRES_DB: devsecops
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
